spring.application.name=IOBANK
server.servlet.context-path=/api/v1

# DataSource Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/bank_db
spring.datasource.username=${RDB_USERNAME: YOUR-USERNAME}
spring.datasource.password=${RDB_PASSWORD: YOUR-PASSWORD}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security Configuration
jwtSecret={JWT_SECRET: YOUR-SECRET-KEY}

# Currency Api Key
currencyApiKey=${CURRENCY_API_KEY: YOUR-API-KEY}